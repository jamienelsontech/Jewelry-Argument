  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt, c = this.overlayRef.current;\n    if (!v || !c || !this._hl || v.readyState < 2 || !v.videoWidth) return;\n\n    // size canvas to element (DPR-aware)\n    const rect = c.getBoundingClientRect();\n    const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    const pw = Math.round(rect.width * dpr), ph = Math.round(rect.height * dpr);\n    if (c.width !== pw || c.height !== ph) { c.width = pw; c.height = ph; }\n    const ctx = c.getContext('2d');\n    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n    ctx.clearRect(0, 0, rect.width, rect.height);\n\n    let ts = performance.now();\n    if (ts <= this._lastTs) ts = this._lastTs + 1;\n    this._lastTs = ts;\n\n    let res;\n    try { res = this._hl.detectForVideo(v, ts); } catch (e) { return; }\n    const hands = res && res.landmarks ? res.landmarks : [];\n    const detected = hands.length > 0;\n    if (detected !== this.state.handDetected) this.setState({ handDetected: detected });\n    if (!detected) return;\n\n    // cover mapping: normalized intrinsic -> displayed CSS px\n    const vw = v.videoWidth, vh = v.videoHeight, rw = rect.width, rh = rect.height;\n    const scale = Math.max(rw / vw, rh / vh);\n    const dw = vw * scale, dh = vh * scale;\n    const ox = (rw - dw) / 2, oy = (rh - dh) / 2;\n    const mirror = this.state.facing === 'user';\n    const map = (p) => ({ x: (mirror ? (1 - p.x) : p.x) * dw + ox, y: p.y * dh + oy });\n\n    const lm = hands[0];\n    this._drawRing(ctx, lm, map);\n    if (this.props.showSkeleton) this._drawSkeleton(ctx, lm, map);\n  }\n\n  _drawRing(ctx, lm, map) {\n    const ring = this.rings[this.state.selected] || this.rings[0];\n    const mcp = map(lm[13]), pip = map(lm[14]);           // ring finger base -> mid joint\n    const midMcp = map(lm[9]);                            // middle finger base (width proxy)\n    const pos = { x: mcp.x + (pip.x - mcp.x) * 0.42, y: mcp.y + (pip.y - mcp.y) * 0.42 };\n    const angle = Math.atan2(pip.y - mcp.y, pip.x - mcp.x);\n    const gap = Math.hypot(mcp.x - midMcp.x, mcp.y - midMcp.y);\n    const userScale = this.props.ringScale ?? 1;\n    const band = Math.max(18, gap * 1.15 * userScale);   // outer band width across finger\n    const rx = band * 0.5;\n    const ry = band * 0.19;                               // foreshortened depth\n\n    ctx.save();\n    ctx.translate(pos.x, pos.y);\n    ctx.rotate(angle + Math.PI / 2);                     // orient band around finger axis\n\n    // metal band (annulus via two ellipses)\n    const grad = ctx.createLinearGradient(-rx, 0, rx, 0);\n    grad.addColorStop(0, ring.metalDark);\n    grad.addColorStop(0.35, ring.metal);\n    grad.addColorStop(0.5, '#ffffff');\n    grad.addColorStop(0.65, ring.metal);\n    grad.addColorStop(1, ring.metalDark);\n    ctx.beginPath();\n    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);\n    ctx.ellipse(0, 0, rx * 0.66, ry * 0.66, 0, 0, Math.PI * 2);\n    ctx.fillStyle = grad;\n    ctx.fill('evenodd');\n    ctx.lineWidth = 0.8;\n    ctx.strokeStyle = 'rgba(0,0,0,0.25)';\n    ctx.stroke();\n\n    // gemstone at top of band\n    if (ring.hasGem) {\n      const gy = -ry - band * 0.05;\n      const gr = band * 0.2;\n      const gg = ctx.createRadialGradient(-gr * 0.3, gy - gr * 0.3, gr * 0.1, 0, gy, gr);\n      gg.addColorStop(0, '#ffffff');\n      gg.addColorStop(0.45, ring.gem);\n      gg.addColorStop(1, ring.metalDark);\n      ctx.beginPath();\n      ctx.arc(0, gy, gr, 0, Math.PI * 2);\n      ctx.fillStyle = gg;\n      ctx.fill();\n      ctx.lineWidth = 1;\n      ctx.strokeStyle = 'rgba(255,255,255,0.7)';\n      ctx.stroke();\n      // sparkle\n      ctx.beginPath();\n      ctx.arc(-gr * 0.35, gy - gr * 0.35, gr * 0.22, 0, Math.PI * 2);\n      ctx.fillStyle = 'rgba(255,255,255,0.95)';\n      ctx.fill();\n    }\n    ctx.restore();\n  }\n\n  _drawSkeleton(ctx, lm, map) {\n    ctx.fillStyle = 'rgba(200,170,90,0.9)';\n    lm.forEach(p => { const q = map(p); ctx.beginPath(); ctx.arc(q.x, q.y, 3, 0, Math.PI * 2); ctx.fill(); });\n  }\n\n  select(i) { this.setState({ selected: i }); }\n\n  capture() {\n    const v = this.videoRef.current, o = this.overlayRef.current;\n    if (!v || !o) return;\n    const rect = o.getBoundingClientRect();\n    const cv = document.createElement('canvas');\n    cv.width = Math.round(rect.width); cv.height = Math.round(rect.height);\n    const ctx = cv.getContext('2d');\n    // draw video with same cover crop\n    const vw = v.videoWidth, vh = v.videoHeight, rw = cv.width, rh = cv.height;\n    const scale = Math.max(rw / vw, rh / vh);\n    const dw = vw * scale, dh = vh * scale;\n    const ox = (rw - dw) / 2, oy = (rh - dh) / 2;\n    if (this.state.facing === 'user') { ctx.save(); ctx.translate(rw, 0); ctx.scale(-1, 1); ctx.drawImage(v, ox, oy, dw, dh); ctx.restore(); }\n    else ctx.drawImage(v, ox, oy, dw, dh);\n    ctx.drawImage(o, 0, 0, rw, rh);\n    this.setState({ captured: cv.toDataURL('image/jpeg', 0.92) });\n  }\n\n  closeCapture() { this.setState({ captured: null }); }\n\n  download() {\n    const a = document.createElement('a');\n    a.href = this.state.captured; a.download = 'tryon.jpg'; a.click();\n  }\n\n  async share() {\n    try {\n      const blob = await (await fetch(this.state.captured)).blob();\n      const file = new File([blob], 'tryon.jpg', { type: 'image/jpeg' });\n      if (navigator.canShare && navigator.canShare({ files: [file] })) {\n        await navigator.share({ files: [file], title: this.props.storeName || 'Try-on' });\n        return;\n      }\n    } catch (e) {}\n    this.download();\n  }\n\n  renderVals() {\n    const { phase, selected, handDetected, facing, captured } = this.state;\n    const rings = this.rings.map((r, i) => {\n      const isSel = i === selected;\n      return {\n        onSelect: () => this.select(i),\n        thumbStyle: `appearance:none;cursor:pointer;flex:0 0 auto;width:60px;height:60px;border-radius:14px;scroll-snap-align:center;display:flex;align-items:center;justify-content:center;background:${isSel ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.05)'};border:1.5px solid ${isSel ? 'oklch(0.82 0.07 78)' : 'rgba(255,255,255,0.1)'};transition:all .15s;`,\n        bandStyle: `position:relative;width:30px;height:30px;border-radius:50%;border:5px solid ${r.metal};box-shadow:inset 0 0 0 1px rgba(0,0,0,0.15);display:block;`,\n        gemStyle: r.hasGem ? `position:absolute;top:-6px;left:50%;transform:translateX(-50%) rotate(45deg);width:9px;height:9px;background:${r.gem};border:1px solid rgba(0,0,0,0.15);` : 'display:none;',\n      };\n    });\n    const sel = this.rings[selected] || this.rings[0];\n    return {\n      videoRef: this.videoRef,\n      overlayRef: this.overlayRef,\n      videoStyle: { position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', background: '#000', transform: facing === 'user' ? 'scaleX(-1)' : 'none' },\n      storeName: this.props.storeName ?? 'AURELIA',\n      isIntro: phase === 'intro',\n      isLoading: phase === 'loading',\n      isError: phase === 'error',\n      isLive: phase === 'live',\n      errMsg: this.state.errMsg,\n      showHint: phase === 'live' && !handDetected,\n      hasCapture: !!captured,\n      captured,\n      rings,\n      selectedName: sel.name,\n      selectedPrice: sel.price,\n      start: () => this.start(),\n      flip: () => this.flip(),\n      capture: () => this.capture(),\n      closeCapture: () => this.closeCapture(),\n      download: () => this.download(),\n      share: () => this.share(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

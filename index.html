<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Classique Jewelry — Virtual Ring Try-On</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0b; overflow: hidden; }
  body { font-family: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif; color: #fff; user-select: none; }
  .serif { font-family: 'Cormorant Garamond', Georgia, serif; }
  a { color: #c8a96e; text-decoration: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes pulseDot { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
  .hidescroll::-webkit-scrollbar { display: none; }
  .hidescroll { scrollbar-width: none; }

  #stage { position: relative; width: 100%; height: 100dvh; overflow: hidden; background: #0a0a0b; }
  #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; background: #000; }
  #overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; display: block; }

  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px; }
  .hidden { display: none !important; }

  #intro { background: radial-gradient(120% 90% at 50% 20%, #17171a 0%, #0a0a0b 70%); }
  .brand { font-size: 13px; letter-spacing: 0.34em; text-transform: uppercase; color: #c8a96e; padding-left: 0.34em; }
  #intro .brand { margin-bottom: 44px; font-size: 15px; letter-spacing: 0.42em; }
  .logo-ring { width: 84px; height: 84px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.14); display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
  .logo-ring-inner { width: 46px; height: 46px; border-radius: 50%; border: 3px solid #c8a96e; position: relative; }
  .logo-gem { position: absolute; top: -7px; left: 50%; transform: translateX(-50%) rotate(45deg); width: 11px; height: 11px; background: #e6ecff; border: 1.5px solid #c8a96e; }
  h1.intro-h { font-weight: 500; font-size: 38px; line-height: 1.1; margin: 0 0 14px; max-width: 320px; }
  .intro-p { font-size: 15px; line-height: 1.55; color: rgba(255,255,255,0.6); margin: 0 0 40px; max-width: 300px; }
  .btn-primary { appearance: none; border: none; cursor: pointer; background: #fff; color: #111; font-size: 15px; font-weight: 600; letter-spacing: 0.02em; padding: 16px 40px; border-radius: 100px; transition: transform .15s; }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:hover { transform: translateY(-1px); }
  .fine-print { font-size: 12px; color: rgba(255,255,255,0.35); margin: 20px 0 0; }

  .spinner { width: 34px; height: 34px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.15); border-top-color: #c8a96e; animation: spin 0.8s linear infinite; }
  .loading-p { font-size: 14px; color: rgba(255,255,255,0.6); margin: 22px 0 0; letter-spacing: 0.03em; }

  .err-icon { font-size: 30px; margin-bottom: 16px; }
  h2.err-h { font-weight: 500; font-size: 24px; margin: 0 0 10px; }
  .err-p { font-size: 14px; line-height: 1.55; color: rgba(255,255,255,0.6); margin: 0 0 30px; max-width: 300px; }
  .btn-outline { appearance: none; border: 1px solid rgba(255,255,255,0.25); cursor: pointer; background: transparent; color: #fff; font-size: 14px; font-weight: 600; padding: 13px 32px; border-radius: 100px; }

  #live { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 20px; padding-top: max(20px, env(safe-area-inset-top)); background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent); pointer-events: auto; }
  .flip-btn { appearance: none; border: none; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.14); backdrop-filter: blur(8px); color: #fff; font-size: 17px; display: flex; align-items: center; justify-content: center; }
  .hint-row { display: flex; justify-content: center; pointer-events: none; }
  .hint-pill { display: flex; align-items: center; gap: 9px; background: rgba(10,10,11,0.55); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.12); padding: 9px 16px; border-radius: 100px; font-size: 13px; color: rgba(255,255,255,0.85); animation: fadeUp .3s; }
  .hint-dot { width: 7px; height: 7px; border-radius: 50%; background: #c8a96e; animation: pulseDot 1.4s infinite; }

  .bottom-bar { padding: 0 0 max(18px, env(safe-area-inset-bottom)); background: linear-gradient(to top, rgba(0,0,0,0.65), transparent); pointer-events: auto; }
  .sel-info { text-align: center; padding: 12px 0 2px; }
  .sel-name { font-size: 19px; font-weight: 500; line-height: 1.1; }
  .sel-price { font-size: 12px; color: #c8a96e; letter-spacing: 0.04em; margin-top: 2px; }
  .catalog { display: flex; gap: 12px; overflow-x: auto; padding: 14px 20px 18px; scroll-snap-type: x mandatory; }
  .ring-thumb { appearance: none; cursor: pointer; flex: 0 0 auto; width: 60px; height: 60px; border-radius: 14px; scroll-snap-align: center; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); transition: all .15s; overflow: hidden; padding: 0; }
  .ring-thumb.sel { background: rgba(255,255,255,0.14); border-color: #c8a96e; }
  .ring-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
  .capture-row { display: flex; align-items: center; justify-content: center; padding: 0 0 6px; }
  .capture-btn { appearance: none; border: none; cursor: pointer; width: 66px; height: 66px; border-radius: 50%; background: transparent; padding: 0; display: flex; align-items: center; justify-content: center; }
  .capture-ring { width: 66px; height: 66px; border-radius: 50%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; }
  .capture-dot { width: 52px; height: 52px; border-radius: 50%; background: #fff; }

  #captureModal { position: absolute; inset: 0; z-index: 5; display: flex; flex-direction: column; background: #0a0a0b; animation: fadeUp .25s; }
  .capture-preview { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; min-height: 0; }
  .capture-preview img { max-width: 100%; max-height: 100%; border-radius: 16px; object-fit: contain; }
  .capture-actions { display: flex; gap: 12px; padding: 12px 20px max(24px, env(safe-area-inset-bottom)); justify-content: center; }
  .btn-share { appearance: none; border: none; cursor: pointer; background: #c8a96e; color: #1a1405; font-size: 14px; font-weight: 600; padding: 14px 30px; border-radius: 100px; }
  .btn-save { appearance: none; border: none; cursor: pointer; background: #fff; color: #111; font-size: 14px; font-weight: 600; padding: 14px 30px; border-radius: 100px; }
</style>
</head>
<body>
<div id="stage">
  <video id="video" playsinline muted autoplay></video>
  <canvas id="overlay"></canvas>

  <div id="intro" class="screen">
    <div class="brand serif">CLASSIQUE JEWELRY</div>
    <div class="logo-ring"><div class="logo-ring-inner"><div class="logo-gem"></div></div></div>
    <h1 class="intro-h serif">Try rings on, virtually</h1>
    <p class="intro-p">Point your camera at your hand. We'll place the ring on your finger in real time.</p>
    <button class="btn-primary" id="startBtn">Enable camera</button>
    <p class="fine-print">Your camera stays on your device.</p>
  </div>

  <div id="loading" class="screen hidden">
    <div class="spinner"></div>
    <p class="loading-p">Preparing try-on…</p>
  </div>

  <div id="errorScreen" class="screen hidden">
    <div class="err-icon">◇</div>
    <h2 class="err-h serif">Camera unavailable</h2>
    <p class="err-p" id="errMsg"></p>
    <button class="btn-outline" id="retryBtn">Try again</button>
  </div>

  <div id="live" class="hidden">
    <div class="top-bar">
      <div class="brand serif">CLASSIQUE JEWELRY</div>
      <button class="flip-btn" id="flipBtn" aria-label="Flip camera">⟳</button>
    </div>
    <div class="hint-row">
      <div class="hint-pill" id="handHint">
        <span class="hint-dot"></span>
        Show your hand to the camera
      </div>
    </div>
    <div class="bottom-bar">
      <div class="sel-info">
        <div class="sel-name serif" id="selName"></div>
        <div class="sel-price" id="selPrice"></div>
      </div>
      <div class="catalog hidescroll" id="catalog"></div>
      <div class="capture-row">
        <button class="capture-btn" id="captureBtn" aria-label="Capture photo">
          <span class="capture-ring"><span class="capture-dot"></span></span>
        </button>
      </div>
    </div>
  </div>

  <div id="captureModal" class="hidden">
    <div class="capture-preview"><img id="capturedImg" alt="Your try-on"></div>
    <div class="capture-actions">
      <button class="btn-outline" id="retakeBtn">Retake</button>
      <button class="btn-save" id="saveBtn">Save</button>
      <button class="btn-share" id="shareBtn">Share</button>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

// ---- Real Classique Jewelry catalog ----
// metal/gem colors are auto-extracted from each photo below; these are
// fallbacks used only if extraction fails (e.g. image blocked by CORS).
const RINGS = [
  {
    name: 'Diamond & Oval Emerald Halo',
    price: '$718.49',
    image: 'https://cdn.shopify.com/s/files/1/0643/0244/8820/files/RM5757-EM-010-YA.jpg?v=1751476044',
    url: 'https://classiquejewelryinc.com/products/14k-diamond-and-oval-emerald-halo-ring14k-yellow-gold',
    fallbackMetal: 0xd8b96a, fallbackGem: 0x2f6d4a
  },
  {
    name: 'Diamond & Ruby Oval Halo',
    price: '$1,638.76',
    image: 'https://cdn.shopify.com/s/files/1/0643/0244/8820/files/RM5759-RU-020-YA.jpg?v=1751476046',
    url: 'https://classiquejewelryinc.com/products/14k-diamond-and-ruby-oval-halo-ring14k-yellow-gold',
    fallbackMetal: 0xd8b96a, fallbackGem: 0x9c1f34
  },
  {
    name: 'Diamond & Sapphire Oval Halo',
    price: '$1,589.26',
    image: 'https://cdn.shopify.com/s/files/1/0643/0244/8820/files/RM5759-SA-020-YA.jpg?v=1751476046',
    url: 'https://classiquejewelryinc.com/products/14k-diamond-and-sapphire-oval-halo-ring14k-yellow-gold',
    fallbackMetal: 0xd8b96a, fallbackGem: 0x24447f
  },
  {
    name: 'Cushion Emerald & Diamond Halo',
    price: '$1,552.95',
    image: 'https://cdn.shopify.com/s/files/1/0643/0244/8820/files/RM7124-EM-021-WA.jpg?v=1751478110',
    url: 'https://classiquejewelryinc.com/products/14k-white-gold-cushion-created-emerald-and-diamond-halo-ring14k-white-gold',
    fallbackMetal: 0xd7d7db, fallbackGem: 0x2f6d4a
  },
  {
    name: "Men's Diamond Signet",
    price: '$1,411.25',
    image: 'https://cdn.shopify.com/s/files/1/0643/0244/8820/files/RS178AA_7adbec54-c92b-41d6-8ac7-7e003334aacb.jpg?v=1751475449',
    url: 'https://classiquejewelryinc.com/products/14k-100x13-open-back-aa-diamond-mens-signet-ring14k-yellow-gold',
    fallbackMetal: 0xd8b96a, fallbackGem: null
  },
  {
    name: 'Classic Initial Oval Diamond',
    price: '$1,209.98',
    image: 'https://cdn.shopify.com/s/files/1/0643/0244/8820/files/10XNR107Y.jpg?v=1751475363',
    url: 'https://classiquejewelryinc.com/products/10k-yellow-gold-classic-initial-oval-with-diamond-ring10k-yellow-gold',
    fallbackMetal: 0xd8b96a, fallbackGem: 0xdfe6f5
  },
];

// ---- App state ----
let phase = 'intro';
let selected = 0;
let facing = 'environment';
let handDetected = false;
let handLandmarker = null;
let rafId = null;
let lastTs = -1;
let captured = null;
const ringImages = [];

const els = {
  video: document.getElementById('video'),
  overlay: document.getElementById('overlay'),
  intro: document.getElementById('intro'),
  loading: document.getElementById('loading'),
  errorScreen: document.getElementById('errorScreen'),
  errMsg: document.getElementById('errMsg'),
  live: document.getElementById('live'),
  handHint: document.getElementById('handHint'),
  selName: document.getElementById('selName'),
  selPrice: document.getElementById('selPrice'),
  catalog: document.getElementById('catalog'),
  captureModal: document.getElementById('captureModal'),
  capturedImg: document.getElementById('capturedImg'),
  startBtn: document.getElementById('startBtn'),
  retryBtn: document.getElementById('retryBtn'),
  flipBtn: document.getElementById('flipBtn'),
  captureBtn: document.getElementById('captureBtn'),
  retakeBtn: document.getElementById('retakeBtn'),
  saveBtn: document.getElementById('saveBtn'),
  shareBtn: document.getElementById('shareBtn'),
};

// ---- Color extraction: sample each ring's real photo to derive a metal
// tone and a gem color, so the 3D model reflects the actual product photo
// rather than a hand-picked palette. ----
function extractColors(img) {
  return new Promise((resolve) => {
    try {
      const w = 56, h = 56;
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const ctx = c.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(img, 0, 0, w, h);
      const data = ctx.getImageData(0, 0, w, h).data;

      let metalR = 0, metalG = 0, metalB = 0, metalN = 0;
      let gemR = 0, gemG = 0, gemB = 0, gemN = 0;

      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
        if (a < 200) continue;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        const lightness = (max + min) / 2;
        if (lightness > 238 || lightness < 12) continue; // skip bg/shadow
        const sat = max === min ? 0 : (max - min) / (255 - Math.abs(2 * lightness - 255));
        if (sat > 0.42 && lightness > 35 && lightness < 215) {
          gemR += r; gemG += g; gemB += b; gemN++;
        } else {
          metalR += r; metalG += g; metalB += b; metalN++;
        }
      }

      const metal = metalN
        ? (Math.round(metalR / metalN) << 16) | (Math.round(metalG / metalN) << 8) | Math.round(metalB / metalN)
        : null;
      const gem = gemN > (w * h * 0.008)
        ? (Math.round(gemR / gemN) << 16) | (Math.round(gemG / gemN) << 8) | Math.round(gemB / gemN)
        : null;
      resolve({ metal, gem });
    } catch (e) {
      resolve({ metal: null, gem: null });
    }
  });
}

function preloadRingImages() {
  RINGS.forEach((r, i) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = async () => {
      const { metal, gem } = await extractColors(img);
      r.metalColor = metal ?? r.fallbackMetal;
      // If the catalog says this ring has no gem at all, never let
      // auto-extraction invent one from a stray dark/shadow pixel.
      r.gemColor = (r.fallbackGem === null) ? null : (gem ?? r.fallbackGem);
      if (i === selected) rebuildRingMesh();
    };
    img.onerror = () => {
      r.metalColor = r.fallbackMetal;
      r.gemColor = r.fallbackGem;
    };
    img.src = r.image;
    ringImages[i] = img;
    // fallback in case extraction is slow/fails silently
    r.metalColor = r.fallbackMetal;
    r.gemColor = r.fallbackGem;
  });
}
preloadRingImages();

function renderCatalog() {
  els.catalog.innerHTML = '';
  RINGS.forEach((r, i) => {
    const btn = document.createElement('button');
    btn.className = 'ring-thumb' + (i === selected ? ' sel' : '');
    btn.innerHTML = `<img src="${r.image}" alt="${r.name}" loading="lazy">`;
    btn.addEventListener('click', () => selectRing(i));
    els.catalog.appendChild(btn);
  });
  els.selName.textContent = RINGS[selected].name;
  els.selPrice.textContent = RINGS[selected].price;
}

function selectRing(i) {
  selected = i;
  renderCatalog();
  rebuildRingMesh();
}

function setPhase(p) {
  phase = p;
  els.intro.classList.toggle('hidden', p !== 'intro');
  els.loading.classList.toggle('hidden', p !== 'loading');
  els.errorScreen.classList.toggle('hidden', p !== 'error');
  els.live.classList.toggle('hidden', p !== 'live');
}

function updateVideoTransform() {
  els.video.style.transform = facing === 'user' ? 'scaleX(-1)' : 'none';
}

async function loadModel() {
  if (handLandmarker) return handLandmarker;
  const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs');
  const fileset = await vision.FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
  const make = (delegate) => vision.HandLandmarker.createFromOptions(fileset, {
    baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task', delegate },
    runningMode: 'VIDEO', numHands: 1,
  });
  try { handLandmarker = await make('GPU'); } catch (e) { handLandmarker = await make('CPU'); }
  return handLandmarker;
}

async function openCamera() {
  if (els.video.srcObject) { els.video.srcObject.getTracks().forEach(t => t.stop()); }
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false,
  });
  els.video.srcObject = stream;
  els.video.setAttribute('playsinline', 'true');
  els.video.muted = true;
  updateVideoTransform();
  await els.video.play();
}

async function start() {
  setPhase('loading');
  try {
    initThree();
    await loadModel();
    await openCamera();
    setPhase('live');
    lastTs = -1;
    loop();
  } catch (err) {
    let msg = 'Please allow camera access and try again.';
    if (err && err.name === 'NotAllowedError') msg = 'Camera permission was denied. Enable it in your browser settings, then try again.';
    else if (err && err.name === 'NotFoundError') msg = 'No camera was found on this device.';
    else if (err && /import|fetch|network/i.test(String(err.message))) msg = 'Could not load the hand-tracking engine. Check your connection and try again.';
    els.errMsg.textContent = msg;
    setPhase('error');
  }
}

async function flip() {
  facing = facing === 'environment' ? 'user' : 'environment';
  updateVideoTransform();
  try { await openCamera(); } catch (e) {}
}

// ---- Three.js 3D ring ----
let scene, camera3, renderer3, ringGroup, bandMesh, gemMesh;
let threeReady = false;

function initThree() {
  if (threeReady) return;
  threeReady = true;

  scene = new THREE.Scene();
  renderer3 = new THREE.WebGLRenderer({ canvas: els.overlay, alpha: true, antialias: true, preserveDrawingBuffer: true });
  renderer3.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

  scene.add(new THREE.AmbientLight(0xffffff, 0.85));
  const key = new THREE.DirectionalLight(0xffffff, 1.2);
  key.position.set(150, -250, 400);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0xffffff, 0.55);
  fill.position.set(-150, 200, -150);
  scene.add(fill);
  const rim = new THREE.PointLight(0xfff4dd, 0.8, 0, 2);
  rim.position.set(0, -100, 200);
  scene.add(rim);

  ringGroup = new THREE.Group();
  scene.add(ringGroup);

  rebuildRingMesh();
  resizeThree();
}

function rebuildRingMesh() {
  if (!ringGroup) return;
  while (ringGroup.children.length) {
    const c = ringGroup.children.pop();
    c.geometry?.dispose();
    c.material?.dispose();
  }

  const ring = RINGS[selected];
  const metalColor = ring.metalColor ?? ring.fallbackMetal ?? 0xd8b96a;
  const gemColor = ring.gemColor ?? ring.fallbackGem;

  // Metalness kept moderate (not near-1.0) so the material shows its actual
  // color from direct scene lights -- a fully "metal" PBR value relies on
  // reflecting an environment map, which this scene doesn't have, and can
  // render as near-black on some devices/lighting setups without one.
  const bandGeo = new THREE.TorusGeometry(1, 0.34, 40, 72);
  const bandMat = new THREE.MeshStandardMaterial({
    color: metalColor, metalness: 0.35, roughness: 0.35,
  });
  bandMesh = new THREE.Mesh(bandGeo, bandMat);
  ringGroup.add(bandMesh);

  if (gemColor != null) {
    const gemGeo = new THREE.OctahedronGeometry(0.46, 0);
    const gemMat = new THREE.MeshPhysicalMaterial({
      color: gemColor, metalness: 0.05, roughness: 0.12,
      clearcoat: 1, clearcoatRoughness: 0.08,
      reflectivity: 0.9,
    });
    gemMesh = new THREE.Mesh(gemGeo, gemMat);
    gemMesh.position.set(0, 1.08, 0);
    gemMesh.scale.set(1, 0.7, 0.55);
    ringGroup.add(gemMesh);

    // Small prong accents around the gem base
    const prongMat = new THREE.MeshStandardMaterial({ color: metalColor, metalness: 0.35, roughness: 0.35 });
    for (let i = 0; i < 4; i++) {
      const ang = (Math.PI / 2) * i + Math.PI / 4;
      const prong = new THREE.Mesh(new THREE.SphereGeometry(0.08, 10, 10), prongMat);
      prong.position.set(Math.cos(ang) * 0.34, 1.0, Math.sin(ang) * 0.26);
      ringGroup.add(prong);
    }
  }
}

let lastW = 0, lastH = 0;
function resizeThree() {
  const rect = els.overlay.getBoundingClientRect();
  const w = Math.max(1, rect.width), h = Math.max(1, rect.height);
  if (w === lastW && h === lastH) return;
  lastW = w; lastH = h;
  renderer3.setSize(w, h, false);
  camera3 = new THREE.OrthographicCamera(0, w, 0, h, -2000, 2000);
  camera3.position.z = 1000;
}

function loop() {
  rafId = requestAnimationFrame(loop);
  const v = els.video;
  if (!v || !handLandmarker || v.readyState < 2 || !v.videoWidth) return;

  resizeThree();
  const rect = els.overlay.getBoundingClientRect();

  let ts = performance.now();
  if (ts <= lastTs) ts = lastTs + 1;
  lastTs = ts;

  let res;
  try { res = handLandmarker.detectForVideo(v, ts); } catch (e) { return; }
  const hands = res && res.landmarks ? res.landmarks : [];
  const detected = hands.length > 0;
  if (detected !== handDetected) {
    handDetected = detected;
    els.handHint.style.display = (phase === 'live' && !handDetected) ? 'flex' : 'none';
  }

  if (detected) {
    const vw = v.videoWidth, vh = v.videoHeight, rw = rect.width, rh = rect.height;
    const scale = Math.max(rw / vw, rh / vh);
    const dw = vw * scale, dh = vh * scale;
    const ox = (rw - dw) / 2, oy = (rh - dh) / 2;
    const mirror = facing === 'user';
    const map = (p) => ({ x: (mirror ? (1 - p.x) : p.x) * dw + ox, y: p.y * dh + oy });

    updateRingTransform(hands[0], map);
    ringGroup.visible = true;
  } else {
    ringGroup.visible = false;
  }

  renderer3.render(scene, camera3);
}

function updateRingTransform(lm, map) {
  const mcp = map(lm[13]), pip = map(lm[14]);
  const midMcp = map(lm[9]);
  const pos = { x: mcp.x + (pip.x - mcp.x) * 0.42, y: mcp.y + (pip.y - mcp.y) * 0.42 };
  const angle = Math.atan2(pip.y - mcp.y, pip.x - mcp.x);
  const gap = Math.hypot(mcp.x - midMcp.x, mcp.y - midMcp.y);
  const band = Math.max(20, gap * 1.3);

  ringGroup.position.set(pos.x, pos.y, 0);

  // Compose rotation: tilt the torus face so it reads as a band wrapping
  // a cylindrical finger (local X tilt), then rotate that tilted ring
  // around the screen Z axis to align with the finger's direction.
  const tiltRad = THREE.MathUtils.degToRad(76);
  const qTilt = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), tiltRad);
  const qAlign = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), angle + Math.PI / 2);
  ringGroup.quaternion.copy(qAlign).multiply(qTilt);

  const scale = band * 0.62;
  ringGroup.scale.set(scale, scale, scale);
}

function capture() {
  const v = els.video, o = els.overlay;
  if (!v || !o) return;
  const rect = o.getBoundingClientRect();
  const cv = document.createElement('canvas');
  cv.width = Math.round(rect.width);
  cv.height = Math.round(rect.height);
  const ctx = cv.getContext('2d');
  const vw = v.videoWidth, vh = v.videoHeight, rw = cv.width, rh = cv.height;
  const scale = Math.max(rw / vw, rh / vh);
  const dw = vw * scale, dh = vh * scale;
  const ox = (rw - dw) / 2, oy = (rh - dh) / 2;
  if (facing === 'user') {
    ctx.save(); ctx.translate(rw, 0); ctx.scale(-1, 1);
    ctx.drawImage(v, ox, oy, dw, dh); ctx.restore();
  } else {
    ctx.drawImage(v, ox, oy, dw, dh);
  }
  ctx.drawImage(o, 0, 0, rw, rh);
  captured = cv.toDataURL('image/jpeg', 0.92);
  els.capturedImg.src = captured;
  els.captureModal.classList.remove('hidden');
}

function closeCapture() {
  captured = null;
  els.captureModal.classList.add('hidden');
}

function downloadCapture() {
  const a = document.createElement('a');
  a.href = captured;
  a.download = 'classique-tryon.jpg';
  a.click();
}

async function shareCapture() {
  try {
    const blob = await (await fetch(captured)).blob();
    const file = new File([blob], 'classique-tryon.jpg', { type: 'image/jpeg' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'Classique Jewelry Try-On' });
      return;
    }
  } catch (e) {}
  downloadCapture();
}

// ---- Wire up events ----
els.startBtn.addEventListener('click', start);
els.retryBtn.addEventListener('click', start);
els.flipBtn.addEventListener('click', flip);
els.captureBtn.addEventListener('click', capture);
els.retakeBtn.addEventListener('click', closeCapture);
els.saveBtn.addEventListener('click', downloadCapture);
els.shareBtn.addEventListener('click', shareCapture);
window.addEventListener('resize', () => { if (threeReady) resizeThree(); });

window.addEventListener('beforeunload', () => {
  if (rafId) cancelAnimationFrame(rafId);
  if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
});

renderCatalog();
setPhase('intro');
</script>
